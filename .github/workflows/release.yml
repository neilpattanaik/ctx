name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-binaries:
    name: build-${{ matrix.asset_name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            asset_name: ctx-linux-x64
            binary_name: ctx
            archive_ext: tar.gz
          - runs_on: macos-14
            asset_name: ctx-macos-arm64
            binary_name: ctx
            archive_ext: tar.gz
          - runs_on: macos-13
            asset_name: ctx-macos-x64
            binary_name: ctx
            archive_ext: tar.gz
          - runs_on: windows-latest
            asset_name: ctx-windows-x64
            binary_name: ctx.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (non-Windows)
        if: runner.os != 'Windows'
        run: bun build src/index.ts --compile --outfile dist/ctx

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: bun build src/index.ts --compile --outfile dist/ctx.exe

      - name: Package binary (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          mkdir -p release
          tar -C dist -czf "release/${{ matrix.asset_name }}.tar.gz" "${{ matrix.binary_name }}"

      - name: Package binary (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "release/${{ matrix.asset_name }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/*
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-latest
    needs:
      - build-binaries

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          sha256sum ctx-* > ctx-checksums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            release-artifacts/ctx-*.tar.gz
            release-artifacts/ctx-*.zip
            release-artifacts/ctx-checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
