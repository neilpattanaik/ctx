name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      run_soak:
        description: Run soak benchmark lane
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 5 * * *"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  test-lanes:
    name: test-${{ matrix.lane.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        lane:
          - id: unit
            command: bun run test:unit:ci
            report: test-results/unit.junit.xml
            coverage: coverage/unit/lcov.info
            diagnostics: ""
          - id: integration
            command: bun run test:integration:ci
            report: test-results/integration.junit.xml
            coverage: coverage/integration/lcov.info
            diagnostics: ""
          - id: e2e
            command: bun run test:e2e:ci
            report: test-results/e2e.junit.xml
            coverage: coverage/e2e/lcov.info
            diagnostics: test-results/e2e-diagnostics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run ${{ matrix.lane.id }} lane
        env:
          CTX_E2E_ARTIFACT_ROOT: ${{ matrix.lane.diagnostics }}
        run: ${{ matrix.lane.command }}

      - name: Upload ${{ matrix.lane.id }} JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lane-${{ matrix.lane.id }}-quality
          path: |
            ${{ matrix.lane.report }}
            ${{ matrix.lane.coverage }}
          if-no-files-found: warn

      - name: Upload e2e flake-gate report
        if: always() && matrix.lane.id == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: lane-e2e-flake-gate
          path: |
            test-results/e2e-flake-gate-report.json
            test-results/e2e-flake-gate-history.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload e2e diagnostics bundle
        if: failure() && matrix.lane.id == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: lane-e2e-diagnostics
          path: test-results/e2e-diagnostics
          if-no-files-found: warn
          retention-days: 14

      - name: Apply e2e flaky rerun policy
        if: failure() && matrix.lane.id == 'e2e'
        run: bun run test:e2e:flake:ci

      - name: Upload e2e flaky analysis report
        if: failure() && matrix.lane.id == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: lane-e2e-flake-analysis
          path: |
            test-results/e2e-flake-report.json
            test-results/e2e-flake-history.json
          if-no-files-found: warn
          retention-days: 14

      - name: Summarize e2e diagnostics artifact
        if: failure() && matrix.lane.id == 'e2e'
        run: |
          {
            echo "### E2E Diagnostics"
            echo "- Artifact: \`lane-e2e-diagnostics\`"
            echo "- Path: \`test-results/e2e-diagnostics\`"
            echo "- Retention: 14 days"
            echo "- Flake gate artifact: \`lane-e2e-flake-gate\`"
            echo "- Flake gate report path: \`test-results/e2e-flake-gate-report.json\`"
            echo "- Flake analysis artifact: \`lane-e2e-flake-analysis\`"
            echo "- Flake report path: \`test-results/e2e-flake-report.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

  soak:
    name: test-soak
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_soak) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run soak lane
        run: bun run test:soak:ci

      - name: Upload soak benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-benchmark-report
          path: test-results/soak-benchmark.json
          if-no-files-found: warn
